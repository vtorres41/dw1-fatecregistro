<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - direção e alinhamentos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Flexbox - Direção e alinhamentos</h2>

    <p>Linha ao centro</p>
    <div class="flex-container row-center">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    </div>

    <p>Linha para esquerda</p>
    <div class="flex-container column-left">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    </div>

    <p>Linha ESPAÇADA</p>
    <div class="flex-container spaced">
        <div class="card">A</div>
        <div class="card">B</div>
        <div class="card">C</div>
    </div>

    <p>Linha ESPAÇADA</p>
    <div class="flex-container wrap">
        <div class="card">1</div>
        <div class="card">2</div>
        <div class="card">3</div>
        <div class="card">4</div>
        <div class="card">5</div>
        <div class="card">6</div>
        <div class="card">7</div>
        <div class="card">8</div>
        <div class="card">9</div>
        <div class="card">10</div>
        <div class="card">11</div>
        <div class="card">12</div>
         <div class="card">13</div>
    </div>

</body>
</html>
