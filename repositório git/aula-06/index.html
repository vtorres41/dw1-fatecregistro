<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de cadastro</title>
</head>
<body>
    <header>
        <h1>Formulário de Cadastro</h1>
    </header>
    <main>
        <section>
            <form action="sucesso.html" method="post">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label for="nome">Nome Completo:</label><br>
                    <input type="text" name="nome" id="nome" placeholder="Insira o seu nome completo" required><br>
                   
                    <label for="email">E-Mail:</label><br>
                    <input type="email" name="email" id="nome" 
                    placeholder="Insira o seu E-Mail" required><br>

                    <label for="password">Senha:</label><br>
                    <input type="password" name="password" id="password" 
                    placeholder="Insira a sua Senha" required><br>

                    <label for="nascimento">Data de Nascimento:</label><br>
                    <input type="date" name="nascimento" id="nascimento"><br>

                    <label for="sexo">Sexo:</label><br>
                    <input type="radio" name="sexo" id="masc" value="m">Masculinino
                      <input type="radio" name="sexo" id="fem" value="f">Feminino
                    
                </fieldset>
                <fieldset>
                    <legend>Dados do Produto:</legend>
                    <label for="quantidade">Quantidade:</label><br>
                    <input type="number" name="quantidade"
                    id="quantidade" min="1" max="10"><br>
                    <label for="cor">Cor:</label><br>
                    <input type="color"><br>
                    <label for="entrega">Agendar entrega para data>
                    </label><br>
                    <input type="datetime-local">
                    <label for="frete">Selecione Frete:</label><br>
                    <select name="frete" id="frete">
                        <option value="PAC">PAC</option>
                        <option value="SEDEX">SEDEX</option>
                        <option value="SEDEX 10">SEDEX 10</option>

                    </select><br><br>

                    <label for="observacoes">Observações</label>
                    <textarea rows="4" cols="40" name="observacoes" 
                    id="observacoes" placeholder="Escreva aqui sobre as observações do Produto"></textarea><br><br>

                    <input type="checkbox" name="termos" id="termos"> Li e Aceito os termos de uso da plataforma
                    <a href="termos.html"
                    
        <button type="button">Ler Termos</button>

        <a/>

        <br> <br> <hr> <br>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>


                    
                </fieldset>

            </form>
        </section>
    </main>
    
</body>
</html>
