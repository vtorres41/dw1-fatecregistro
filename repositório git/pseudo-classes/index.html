<!DOCTYPE html>
<html lang="pt-br">
<head></head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes no CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Demostração de Pseudo-classes</h1>

    <h2>:hover - É ativada quando o mouse passa sobre o 
elemento:</h2>
<div class="caixa">
    <p>passe o mouse aqui</p>

    <br>

    <button class="btn-download">Dowload</button>

    <br>

    <h2>:focus - clique nos campos</h2>
    <form>
        <input type="text" placeholder="Clique aqui para focar">
        <input type="password" placeholder="outro campo com focus">
    </form>
</div>
    
</body>
</html>
